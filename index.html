<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Nachricht senden</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #25D366;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h1>WhatsApp Nachricht</h1>
    <p>Bitte gib deinen Namen ein:</p>

    <input type="text" id="name" placeholder="Dein Name">

    <button onclick="sendWhatsApp()">
        WhatsApp öffnen
    </button>

    <script>
        // Gespeicherten Namen laden
        window.onload = function() {
            const savedName = localStorage.getItem("username");
            if (savedName) {
                document.getElementById("name").value = savedName;
            }
        }

        function sendWhatsApp() {
            const name = document.getElementById("name").value.trim();

            if (!name) {
                alert("Bitte gib deinen Namen ein.");
                return;
            }

            // Namen speichern
            localStorage.setItem("username", name);

            const nummer = "491758307971";
            const nachricht = `Hallo hier ist ${name}`;

            const whatsappURL =
                `https://wa.me/${nummer}?text=${encodeURIComponent(nachricht)}`;

            window.location.href = whatsappURL;
        }
    </script>

</body>
</html>
